<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBIKA - Sistema Inteligente</title>
    <style>
        .barra-superior{
        background-color: #1a1a2e;
            color: white;
            padding: 10px;
            text-aling: center;
        }
        .contenedor-principal{
            display: felx;
            heihgt: clac(100vh-90px);
        }
        .panel-controles{
            width: 300px;
            background-color: #ffffff;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            text aling: left;
        }
         #contenedor-mapa { /*se pone # ya que no es una clase si no un identificador*/
            flex-grow: 1;              /* Le ordena expandirse por toda la derecha */
            background-color: #e2e8f0; /* Color gris temporal mientras cargamos el mapa real */
        }
         .btn-categoria {
            display: block;            /* Hace que el botón ocupe una línea completa */
            width: 100%;               /* Se estira a todo el ancho de la caja blanca */
            margin-bottom: 10px;       /* Separa un botón del otro hacia abajo */
            background-color: #3182ce; /* Color azul moderno */
            color: white;              /* Letras blancas */
            padding: 12px;             /* Espacio interno para que el botón sea grande */
            border: none;              /* Quitamos el borde gris feo por defecto */
            border-radius: 6px;        /* Redondeamos las esquinas suavemente */
            font-size: 15px;           /* Letra legible */
            cursor: pointer;           /* El cursor se vuelve una manito al pasar encima */
        }
    </style>
</head>

<body>
    <header class="barra-superior">
        <h1>UBIKA</h1>
        <h3>asesoria al instante </h3>
    </header>
       
    <div class="contenedor-principal">

        
    <div class="panel-controles">
        <h2>Panel de Asistencia</h2>
        <p>Selecciona la categoría del producto que buscas para ver qué asesores están cerca en el almacén:</p>
        <button class= "btn-categoria">📱 Celulares </button>
        <button calss= "btn-categoria">💻computadores"</button>
        <button calss= "btn-categoria">📺 electrodomesticos"</button>
        </div>

        <!-- Caja del Mapa (El espacio reservado para el mapa de Leaflet) -->
        <div id="contenedor-mapa">
            <!-- Este div se deja vacío por dentro, ya que JavaScript se encargará de inyectar el mapa aquí más adelante -->
        </div>

    </div>

</body>

</html>
